<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning Effect Demo</title>
<style>
  body { background: #111; margin: 0; overflow: hidden; }
  canvas { display: block; margin: 0 auto; background: #222; }
</style>
</head>
<body>
<canvas id="lightningCanvas" width="900" height="600"></canvas>

<script>
// --- Configuration ---
const canvas = document.getElementById('lightningCanvas');
const ctx = canvas.getContext('2d');

// Example zombie and plant positions
let zombie = { x: 100, y: 400 };
let plant = { x: 700, y: 200 };

// Placeholder images (replace with your sprite images)
const ElecPic = [new Image(), new Image()];
ElecPic[0].src = "lightning1.png"; // main segments
ElecPic[1].src = "lightning2.png"; // first segment

// --- Helper Functions ---
function drawSegment(pic, x, y, width, height, rotate = 0, mirror = 0) {
    ctx.save();//keep setting  to this state
    const cx = x + width / 2;
    const cy = y + height / 2;
    ctx.translate(cx, cy);
  
    ctx.rotate(rotate);
     ctx.translate(-cx, -cy);
      if (mirror) {
          let mx = x + width / 2;
          ctx.translate(mx, 0);
          ctx.scale(-1, 1);//left becomes right and right left
          ctx.translate(-mx, 0);
        }
    ctx.drawImage(pic, x, y, width, height);//draw mage
    
    ctx.restore();//restore the state
}

// --- Lightning Effect ---
function drawLightning(start, end) {
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const distance = Math.sqrt(dx*dx + dy*dy);
    const theta = Math.atan2(dy, dx);
    const delta = { x: Math.cos(theta), y: Math.sin(theta) };

    const times = Math.max(2, Math.floor(distance / 80));
    const k = distance / times;

    let currentPos = { ...start };
    const picPos = [];

    for (let t = 0; t < times; t++) {
        picPos.push({
            x: currentPos.x,
            y: currentPos.y,
            width: k,
            rotate: theta
        });
        currentPos.x += delta.x * k;
        currentPos.y += delta.y * k;
    }

    // Draw lightning segments
    for (let t = 0; t < picPos.length; t++) {
        const i = picPos[t];
        const a = [-i.width / 2 + 15 * delta.y, -37.5 / 2 - 10 * delta.x]; //-dy , dx
        const pic = t === 0 ? ElecPic[1] : ElecPic[0];
        const mirror = t === 0 ? 0 : Math.floor(Math.random() * 2);

        drawSegment(pic,
            i.x + delta.x * i.width / 2 + a[0],
            i.y + delta.y * i.width / 2 + a[1],
            i.width,
            37.5,
            i.rotate,
            mirror
        );
    }

    // --- Draw line above lightning ---
    ctx.save();
    ctx.strokeStyle = "red"; // line color
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    ctx.lineTo(end.x, end.y);
    ctx.stroke();
    ctx.restore();
}

// --- Animation Loop ---
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw lightning between zombie and plant
    drawLightning(zombie, plant);

    // requestAnimationFrame(animate);
}

// Wait for images to load
ElecPic[0].onload = ElecPic[1].onload = () => animate();
</script>
</body>
</html>
